<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Restaurante...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- IZIPAY SDK -->
    <script src="https://static.micuentaweb.pe/js/kr-payment-form.js"></script>
</head>
<body>

    <!-- NAVBAR Y CABECERA DEL RESTAURANTE -->
    <header class="restaurant-header" id="heroHeader">
        <div class="header-overlay"></div>
        <nav class="top-nav">
            <div class="logo-area">
                <img src="" alt="Logo" id="headerLogo" class="hidden">
                <h1 id="headerName">Cargando...</h1>
            </div>
            <button class="cart-btn" id="btnOpenCart">
                <i class="fa-solid fa-cart-shopping"></i> 
                <span class="cart-count" id="cartBadge">0</span>
            </button>
        </nav>
        <div class="hero-content">
            <h2 id="heroTitle">Bienvenido</h2>
            <p id="heroHorario"><i class="fa-regular fa-clock"></i> ...</p>
        </div>
    </header>

    <!-- LISTA DE CATEGORÍAS / SUCURSALES Y MENÚ -->
    <main class="container">
        
        <div class="branch-selector hidden" id="branchSelector">
            <h3><i class="fa-solid fa-map-location-dot"></i> Selecciona una Sucursal</h3>
            <div class="tabs" id="branchTabs"></div>
        </div>

        <section class="menu-section">
            <h2 class="section-title">Nuestro Menú</h2>
            <div class="menu-grid" id="menuGrid">
                <!-- Platos Inyectados Aquí -->
                <div class="loading-spinner"><i class="fa-solid fa-spinner fa-spin"></i> Preparando el menú...</div>
            </div>
        </section>

    </main>

    <!-- FLOATING CART SIDEBAR -->
    <div class="cart-overlay" id="cartOverlay">
        <div class="cart-sidebar">
            <div class="cart-header">
                <h2>Tu Pedido</h2>
                <button class="close-btn" id="btnCloseCart"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="cart-items" id="cartItemsList">
                <div class="empty-cart">
                    <i class="fa-solid fa-basket-shopping"></i>
                    <p>Tu carrito está vacío</p>
                </div>
            </div>
            
            <div class="cart-footer">
                <div class="totals">
                    <span>Total a pagar:</span>
                    <strong id="cartTotal">S/ 0.00</strong>
                </div>
                <!-- BOTÓN QUE ABRE IZIPAY -->
                <button class="checkout-btn" id="btnCheckout" disabled>Continuar al Pago <i class="fa-solid fa-shield-halved"></i></button>
            </div>

            <!-- CONTENEDOR OCULTO PARA EL BOTÓN DE IZIPAY POPUP -->
            <div id="izipayContainer" class="hidden" style="margin-top: 1rem; text-align: center;">
                <div class="kr-embedded" kr-popin></div>
            </div>
            
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
